name = "newsletter-research-engine"
main = "index.js"
compatibility_date = "2024-12-01"

# Cron triggers: 1st and 10th of each month at 8am UTC (2am CT)
[triggers]
crons = ["0 8 1 * *", "0 8 10 * *"]

# R2 bucket binding (same bucket can be used across workers)
[[r2_buckets]]
binding = "NEWSLETTER_BUCKET"
bucket_name = "archificials-newsletter"

# Environment variables (non-secret)
[vars]
WORKER_NAME = "research-engine"

# Secrets (set via `npx wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY
#   BRAVE_API_KEY
#   AIRTABLE_API_KEY
#   RESEND_API_KEY
